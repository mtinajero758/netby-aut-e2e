serenity {
  project.name = "NTT Data - Serenity E2E SauceDemo"
  take.screenshots = FOR_EACH_ACTION
  report.encoding = UTF-8
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "start-maximized", "incognito"]
    }
  }
}
timeouts {
  webdriver.wait.for.timeout = 10000
}

feature.file.language = en

environment {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
}
